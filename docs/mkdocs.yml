site_name: rules_latex
site_description: Bazel rules for building LaTeX documents with Tectonic
site_url: https://nicklambourne.github.io/rules_latex/
repo_url: https://github.com/nicklambourne/rules_latex
repo_name: nicklambourne/rules_latex
edit_uri: edit/master/docs/

docs_dir: site
site_dir: ../_site

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
        - ../
        - ../..
      check_paths: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting started:
      - Installation: getting-started/installation.md
      - First document: getting-started/first-document.md
      - Bibliography: getting-started/bibliography.md
      - Live preview: getting-started/live-preview.md
  - Concepts:
      - Hermetic builds: concepts/hermetic-builds.md
      - Caching: concepts/caching.md
      - Reproducibility: concepts/reproducibility.md
  - API reference:
      - Build rules: api/rules.md
      - Providers: api/providers.md
      - Toolchain: api/toolchain.md
  - About:
      - Design rationale: about/design.md
      - Changelog: about/changelog.md
      - Roadmap: about/roadmap.md
