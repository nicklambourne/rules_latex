name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

# Permissions required by bazel-contrib/.github/release_ruleset:
#   contents: write    - upload release files
#   id-token: write    - sign attestations via OIDC
#   attestations: write - upload signed attestations
permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    # Reusable workflow from bazel-contrib that:
    #   - runs `bazel test //...`
    #   - runs .github/workflows/release_prep.sh which writes the
    #     release archive(s) and the docs tarball
    #   - generates SLSA build provenance attestations over the
    #     release files (one .intoto.jsonl per archive)
    #   - publishes a GitHub Release with everything attached
    #
    # See https://github.com/bazel-contrib/bazel-central-registry/discussions/2721
    # for the BCR provenance design these attestations implement.
    uses: bazel-contrib/.github/.github/workflows/release_ruleset.yaml@v7.5.0
    with:
      bazel_test_command: bazel test //... //tests/...
      prerelease: false
      release_files: |
        rules_latex-*.tar.gz
      # The reusable workflow generates release notes automatically.
      # Our release_prep.sh prepends its own preamble (BCR submission
      # snippet etc.) for module consumers.
      generate_release_notes: true

  # Auto-publish to the Bazel Central Registry once the release
  # itself is up. The BCR_PUBLISH_TOKEN secret needs to be configured
  # under repo settings (Classic PAT with repo + workflow scopes).
  # If the secret is missing, the publish job will fail loudly; that
  # failure doesn't break the release that already went out, just
  # the BCR submission step.
  publish-to-bcr:
    needs: release
    uses: ./.github/workflows/publish.yml
    with:
      tag_name: ${{ github.ref_name }}
    secrets:
      publish_token: ${{ secrets.BCR_PUBLISH_TOKEN }}
    permissions:
      contents: write
      id-token: write
      attestations: write
