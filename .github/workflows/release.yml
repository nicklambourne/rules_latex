name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

jobs:
  release:
    name: Build release archive and publish GitHub Release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Verify MODULE.bazel version matches tag
        run: |
          mod_version="$(grep -oE 'version = "[^"]+"' MODULE.bazel | head -1 | sed -E 's/version = "(.+)"/\1/')"
          if [[ "${mod_version}" != "${{ steps.version.outputs.version }}" ]]; then
            echo "FAIL: MODULE.bazel version (${mod_version}) does not match tag (${{ steps.version.outputs.version }})." >&2
            exit 1
          fi
          echo "MODULE.bazel version matches tag: ${mod_version}"

      - name: Build release archive
        id: archive
        run: |
          tag="${{ steps.version.outputs.tag }}"
          version="${{ steps.version.outputs.version }}"
          archive="rules_latex-${version}.tar.gz"
          # Use git archive to get a clean snapshot at the tagged commit,
          # respecting .gitattributes. Strip the leading prefix so users
          # extracting the archive land directly in the repo root.
          git archive --format=tar.gz \
              --prefix="rules_latex-${version}/" \
              -o "${archive}" \
              "${tag}"
          sha256="$(sha256sum "${archive}" | cut -d' ' -f1)"
          {
            echo "archive=${archive}"
            echo "sha256=${sha256}"
          } >> "$GITHUB_OUTPUT"
          echo "Archive ${archive} sha256=${sha256}"

      - name: Generate BCR integrity hint
        id: bcr
        run: |
          version="${{ steps.version.outputs.version }}"
          sha256="${{ steps.archive.outputs.sha256 }}"
          # The Bazel Central Registry's source.json wants a base64'd
          # sha256 prefixed with "sha256-". We provide it pre-formatted so
          # the human opening the BCR PR can copy-paste.
          integrity="sha256-$(printf '%s' "${sha256}" | xxd -r -p | base64 -w0)"
          {
            echo "integrity=${integrity}"
            echo "url=https://github.com/${{ github.repository }}/releases/download/v${version}/rules_latex-${version}.tar.gz"
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          version="${{ steps.version.outputs.version }}"
          archive="${{ steps.archive.outputs.archive }}"
          sha256="${{ steps.archive.outputs.sha256 }}"
          integrity="${{ steps.bcr.outputs.integrity }}"
          url="${{ steps.bcr.outputs.url }}"

          notes="$(mktemp)"
          cat > "${notes}" <<EOF
          ## rules_latex ${version}

          Release archive sha256: \`${sha256}\`

          ### Bzlmod consumption

          \`\`\`python
          bazel_dep(name = "rules_latex", version = "${version}")
          \`\`\`

          ### Bazel Central Registry submission

          The BCR \`source.json\` fields for this release:

          \`\`\`json
          {
            "url": "${url}",
            "integrity": "${integrity}",
            "strip_prefix": "rules_latex-${version}"
          }
          \`\`\`

          See [\`CHANGELOG.md\`](https://github.com/${{ github.repository }}/blob/${tag}/CHANGELOG.md) for the user-facing changes in this release.
          EOF

          gh release create "${tag}" \
            "${archive}" \
            --title "rules_latex ${version}" \
            --notes-file "${notes}"
