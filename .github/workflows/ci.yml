name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & smoke-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bazelisk
        uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.os }}
          repository-cache: true

      - name: Build rules_latex (root)
        run: bazel build //... --config=ci

      - name: Smoke test example/hello
        working-directory: example
        run: |
          bazel build //:hello --config=ci
          ls -lh bazel-bin/hello.pdf
          file bazel-bin/hello.pdf | grep -q "PDF document"

      - name: Build offline via checked-in cache snapshot
        working-directory: example
        run: |
          bazel build //:hello_offline --config=ci
          ls -lh bazel-bin/hello_offline.pdf
          file bazel-bin/hello_offline.pdf | grep -q "PDF document"

      - name: Build latex_serve launcher
        working-directory: example
        run: |
          # We can't easily run an interactive watcher in CI, but
          # building the target catches regressions in the rule, the
          # template expansion, and the LatexInfo propagation from
          # latex_document.
          bazel build //:hello_serve --config=ci
          test -x bazel-bin/hello_serve.sh
          test -f bazel-bin/hello_serve.py
          grep -q '^DOCUMENT_LABEL = "@@//:hello_offline"' bazel-bin/hello_serve.py

      - name: Run latex_test target
        working-directory: example
        run: bazel test //:hello_compiles --config=ci

      - name: Verify reproducible build is byte-identical
        working-directory: example
        run: |
          bazel build //:hello_reproducible --config=ci
          first_sha="$(sha256sum bazel-bin/hello_reproducible.pdf | cut -d' ' -f1)"
          bazel clean --expunge
          bazel build //:hello_reproducible --config=ci
          second_sha="$(sha256sum bazel-bin/hello_reproducible.pdf | cut -d' ' -f1)"
          if [[ "$first_sha" != "$second_sha" ]]; then
            echo "FAIL: reproducible build is not byte-identical." >&2
            echo "  first  = $first_sha" >&2
            echo "  second = $second_sha" >&2
            exit 1
          fi
          echo "OK: reproducible build is byte-identical (sha256=$first_sha)"

      - name: Verify cache snapshot regeneration is byte-identical
        working-directory: example
        run: |
          # The snapshot tarball is content-addressed and deterministic;
          # re-running //:hello_snapshot should leave hello_cache.tar.gz
          # unchanged. Catches non-reproducibility bugs in the packing
          # logic before they sneak into a checked-in snapshot.
          first_sha="$(sha256sum hello_cache.tar.gz | cut -d' ' -f1)"
          bazel run //:hello_snapshot
          second_sha="$(sha256sum hello_cache.tar.gz | cut -d' ' -f1)"
          if [[ "$first_sha" != "$second_sha" ]]; then
            echo "FAIL: re-running //:hello_snapshot produced a different tarball." >&2
            echo "  first  = $first_sha" >&2
            echo "  second = $second_sha" >&2
            exit 1
          fi
          echo "OK: snapshot regeneration is byte-identical (sha256=$first_sha)"

  lint:
    name: buildifier
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - name: Install buildifier
        run: |
          wget -qO /usr/local/bin/buildifier https://github.com/bazelbuild/buildtools/releases/latest/download/buildifier-linux-amd64
          chmod +x /usr/local/bin/buildifier
      - name: Lint
        run: buildifier --mode=check --lint=warn -r .
