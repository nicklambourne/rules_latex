name: Publish to BCR

# Triggered both by:
#   1. workflow_dispatch (manual UI trigger) — for ad-hoc retries
#      after release publication issues.
#   2. workflow_call from the Release workflow — fires once the
#      attestations and release are published. This is the
#      happy-path automation.
#
# See https://github.com/bazel-contrib/publish-to-bcr for the design
# of this reusable workflow.
on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish to BCR (e.g. v0.2.0)"
        required: true
        type: string
      templates_ref:
        description: |
          Optional git ref to read .bcr/ templates from. Defaults to
          the tag itself, but can be overridden (e.g. to "master") when
          republishing a release whose templates had errors.
        required: false
        type: string
        default: ""
      release_artifacts_run_id:
        description: |
          Workflow run id to download release_files/attestations from.
          Defaults to the current run; set explicitly when retrying a
          publish out-of-band against an older release's artifacts.
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      tag_name:
        description: "Release tag to publish to BCR"
        required: true
        type: string
    secrets:
      publish_token:
        description: PAT for opening the BCR PR
        required: true

permissions:
  # Necessary for the publish-to-bcr reusable workflow.
  contents: write
  id-token: write
  attestations: write

jobs:
  publish:
    # Pinned tag rather than @main so an upstream breaking change
    # doesn't silently affect our release.
    uses: bazel-contrib/publish-to-bcr/.github/workflows/publish.yaml@v1.2.0
    with:
      tag_name: ${{ inputs.tag_name }}
      # Fork of bazelbuild/bazel-central-registry. The PAT under
      # BCR_PUBLISH_TOKEN must have push access here.
      registry_fork: nicklambourne/bazel-central-registry
      # Attestations now ride along with the release because the
      # release workflow uses bazel-contrib/.github's
      # release_ruleset reusable workflow (see release.yml). The
      # publish workflow picks them up automatically.
      attest: true
      # When invoked via workflow_dispatch with templates_ref set,
      # read .bcr/ templates from that ref (e.g. master) instead of
      # the tag. Falls back to the tag for normal workflow_call
      # invocations from release.yml.
      templates_ref: ${{ inputs.templates_ref || inputs.tag_name }}
      # Same idea for release artifacts: dispatch can point at a past
      # release's run id; workflow_call uses the current run.
      release_artifacts_run_id: ${{ inputs.release_artifacts_run_id || github.run_id }}
    secrets:
      # Classic PAT with `repo` + `workflow` scopes, owned by the
      # account that maintains the registry fork above.
      publish_token: ${{ secrets.BCR_PUBLISH_TOKEN }}
